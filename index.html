<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js" type="text/javascript"></script>
  <style>
    body { font-family: sans-serif; text-align: center; padding: 20px; background-color: #f0f0f0; }
    #reader { width: 100%; max-width: 400px; margin: 20px auto; background-color: white; }
    #reader video { transform: scaleX(-1); }
    #status { margin-top: 15px; font-size: 18px; font-weight: bold; padding: 10px; border-radius: 5px; }
    .status-waiting { color: #555; }
    .status-success { color: #fff; background-color: #28a745; }
    button { font-size: 18px; padding: 10px 20px; margin-top: 10px; }
  </style>
</head>
<body>
  <h1>QRコードリーダー</h1>
  <button id="unlockBtn">🔊 音声を有効化（最初に1回押してください）</button>
  <div id="reader"></div>
  <div id="status" class="status-waiting">待機中</div>

  <audio id="sound0" src="https://mitarashi-1209.github.io/-/yomikomikannryou.mp3"></audio>
  <audio id="sound1" src="https://mitarashi-1209.github.io/-/yomikomi_voice.mp3"></audio>
  <audio id="sound2" src="https://mitarashi-1209.github.io/-/omachikudasai.mp3"></audio>

  <script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbxHKTLZlQ6OCwQvjscgmUOuh7uqG-fAM-M-G9yxwwOzYiOtga2PWvFuUsrgJoqp7DKg1A/exec";
    const statusEl = document.getElementById("status");
    let isProcessing = false;
    let lastDecodedText = "";
    const COOLDOWN_MS = 3000;

    const sounds = [
      document.getElementById("sound0"),
      document.getElementById("sound1"),
      document.getElementById("sound2")
    ];

    let audioUnlocked = false;

    document.getElementById("unlockBtn").addEventListener("click", (e) => {
      sounds.forEach(a => {
        a.load();
      });
      audioUnlocked = true;
      e.target.style.display = "none";
    });

    function playSequentially(index = 0) {
      if (index >= sounds.length) return;
      const audio = sounds[index];
      audio.currentTime = 0;
      audio.play().catch(err => console.log("再生エラー:", err));
      audio.onended = () => playSequentially(index + 1);
    }

    function onScanSuccess(decodedText) {
      if (isProcessing || decodedText === lastDecodedText) return;
      isProcessing = true;
      lastDecodedText = decodedText;
      statusEl.innerText = "読み取り完了！送信中...";
      statusEl.className = "status-success";
      if (audioUnlocked) {
        setTimeout(() => playSequentially(), 380);
      }
      fetch(GAS_URL, {
        method: "POST",
        mode: "no-cors",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ staff: decodedText }),
      })
      .then(() => console.log("送信成功"))
      .catch((err) => console.log("送信エラー:", err));
      setTimeout(() => {
        isProcessing = false;
        lastDecodedText = "";
        statusEl.innerText = "待機中";
        statusEl.className = "status-waiting";
      }, COOLDOWN_MS);
    }

    function onScanFailure(error) {}

    const html5QrcodeScanner = new Html5QrcodeScanner(
      "reader",
      { fps: 10, qrbox: { width: 350, height: 350 }, rememberLastUsedCamera: true },
      false
    );
    html5QrcodeScanner.render(onScanSuccess, onScanFailure);
  </script>
</body>
</html>
